llm:
  # Usado por el pipeline clásico (main.py sin --graph)
  #
  # ── Providers disponibles ──────────────────────────────────────────────────
  # anthropic → Claude API        (requiere ANTHROPIC_API_KEY en .env)
  # openai    → OpenAI API        (requiere OPENAI_API_KEY en .env)
  # ollama    → Ollama local      (sin coste, sin clave — instalar ollama.ai)
  # lmstudio  → LM Studio local   (sin coste, sin clave — instalar lmstudio.ai)
  #             Arrancar: LM Studio → pestaña Developer → Start Server (puerto 1234)
  # vllm      → vLLM server       (sin coste, sin clave — pip install vllm)
  #             Arrancar: vllm serve <modelo> --port 8000
  #             URL personalizable con variable de entorno: VLLM_BASE_URL
  #
  # ── Modelos recomendados por provider ──────────────────────────────────────
  # anthropic: claude-opus-4-6, claude-sonnet-4-6, claude-haiku-4-5-20251001
  # openai:    gpt-4o, gpt-4-turbo
  # ollama:    llama3.1:8b (rápido), mixtral:8x7b (balance)
  # lmstudio:  llama-3.3-70b-instruct   ← RECOMENDADO (Meta, USA)
  #            mistral-large-instruct    ← muy bueno para análisis (Mistral, Francia)
  #            phi-4                     ← muy eficiente en hardware limitado (Microsoft)
  #            gemma-2-27b-it            ← buena calidad/tamaño (Google)
  #            mixtral-8x7b-instruct-v0.1
  # vllm:      meta-llama/Llama-3.3-70B-Instruct
  #            mistralai/Mixtral-8x7B-Instruct-v0.1
  #            microsoft/phi-4
  #            google/gemma-2-27b-it
  #
  # PROHIBIDO: modelos de origen chino (DeepSeek, Qwen, Yi, Baichuan, etc.)
  provider: anthropic
  model: claude-sonnet-4-6
  temperature: 0.1

# ─────────────────────────────────────────────────────────────────────────────
# MULTI-AGENT PIPELINE (main.py --graph)
# Cada agente usa el modelo más adecuado para su tarea.
# Si un agente no está configurado aquí, usa las claves de `llm` como fallback.
#
# ── CONFIGURACIÓN LOCAL 100% GRATUITA (LM Studio) ───────────────────────────
# Para usar sin API keys, sustituye los bloques de cada agente por:
#
#   recon:          provider: lmstudio  model: phi-4
#   threat_intel:   provider: lmstudio  model: llama-3.3-70b-instruct
#   knowledge_judge:provider: lmstudio  model: mistral-large-instruct
#   attack_planner: provider: lmstudio  model: llama-3.3-70b-instruct
#   payload_crafter:provider: lmstudio  model: mistral-large-instruct
#   playbook_assembler: provider: lmstudio  model: phi-4
#   validator:      provider: lmstudio  model: mistral-large-instruct
#   presentation:   provider: lmstudio  model: gemma-2-27b-it
#
# Razonamiento de la selección:
#   phi-4            → tareas ligeras (briefing, ensamblado JSON, narrativa)
#                      solo 14B parámetros, muy rápido, sorprendentemente capaz
#   llama-3.3-70b    → tareas de máximo razonamiento (threat intel, planificación)
#                      el mejor modelo open-source occidental para análisis complejo
#   mistral-large    → tareas de validación y código (judge, crafter, validator)
#                      arquitectura diseñada para razonamiento estructurado y código
#   gemma-2-27b-it   → generación de texto narrativo (presentación ejecutiva)
#                      muy bueno en redacción fluida con bajo consumo de VRAM
#
# NOTA: carga solo 1-2 modelos simultáneos en LM Studio para evitar OOM.
# ─────────────────────────────────────────────────────────────────────────────
agents:
  recon:
    # Extracción determinista (PDF/IOC/TTP) + redacción de briefing
    # Haiku/phi-4: el trabajo pesado es regex — el LLM solo escribe el briefing
    provider: anthropic
    model: claude-haiku-4-5-20251001
    temperature: 0.1
    # LOCAL: provider: lmstudio / model: phi-4

  threat_intel:
    # Análisis profundo: actor, campaña, demonstrability, CrowdStrike products
    # Opus/llama-3.3-70b: máximo razonamiento y dominio de threat intelligence
    provider: anthropic
    model: claude-opus-4-6
    temperature: 0.1
    # LOCAL: provider: lmstudio / model: llama-3.3-70b-instruct

  attack_planner:
    # Diseño de la secuencia de ataque + incorporación de feedback del validator
    # Opus/llama-3.3-70b: razonamiento estratégico, conocimiento del kill chain MITRE
    provider: anthropic
    model: claude-opus-4-6
    temperature: 0.1
    # LOCAL: provider: lmstudio / model: llama-3.3-70b-instruct

  payload_crafter:
    # Generación de snippets de emulación (código seguro)
    # Sonnet/mistral-large: fuerte en generación de código técnico estructurado
    provider: anthropic
    model: claude-sonnet-4-6
    temperature: 0.1
    # LOCAL: provider: lmstudio / model: mistral-large-instruct

  playbook_assembler:
    # El ensamblado JSON es determinista; LLM solo para la narrativa de demo
    # Sonnet/phi-4: tarea ligera, phi-4 es suficiente y muy rápido
    provider: anthropic
    model: claude-sonnet-4-6
    temperature: 0.1
    # LOCAL: provider: lmstudio / model: phi-4

  validator:
    # Validación lógica + feedback para retry loop
    # Sonnet/mistral-large: diseñado para razonamiento estructurado y validación
    provider: anthropic
    model: claude-sonnet-4-6
    temperature: 0.1
    # LOCAL: provider: lmstudio / model: mistral-large-instruct

  knowledge_judge:
    # Valida el análisis de ThreatIntelAgent contra domain knowledge completo
    # Sonnet/mistral-large: validación lógica y revisión de IOC/TTP accuracy
    provider: anthropic
    model: claude-sonnet-4-6
    temperature: 0.1
    # LOCAL: provider: lmstudio / model: mistral-large-instruct

  presentation:
    # Genera executive brief y key selling points de CrowdStrike
    # Sonnet/gemma-2-27b: buena redacción narrativa con bajo consumo de VRAM
    provider: anthropic
    model: claude-sonnet-4-6
    temperature: 0.2
    # LOCAL: provider: lmstudio / model: gemma-2-27b-it

output:
  playbook_dir: playbooks

demo:
  platform: windows       # Default emulation platform: windows | linux

