llm:
  # Provider: ollama | anthropic | openai
  # ollama    → local model, no cost, lower quality (good for dev)
  # anthropic → Claude API, best quality (export ANTHROPIC_API_KEY=sk-ant-...)
  # openai    → GPT-4 API, good quality   (export OPENAI_API_KEY=sk-...)
  provider: ollama
  model: llama3
  temperature: 0.1
  # Recommended models per provider:
  #   ollama:    llama3.1:70b, mixtral:8x7b
  #   anthropic: claude-opus-4-6, claude-sonnet-4-5-20250929
  #   openai:    gpt-4o, gpt-4-turbo

output:
  playbook_dir: playbooks

demo:
  platform: windows       # Default emulation platform: windows | linux

# ─────────────────────────────────────────────────────────────────────────────
# LAB ARCHITECTURE
# Update this section when the lab topology changes.
# llm_analyzer.py reads lab_context_prompt (path) and injects it into prompts.
# playbook_generator.py reads the machines/c2 blocks for hardcoded targets.
# ─────────────────────────────────────────────────────────────────────────────
lab:
  lab_context_prompt: promtps/lab_context.txt   # system-prompt file with full topology

  machines:
    win_prevention:
      ip: "10.5.9.30"
      os: windows
      domain_joined: true
      edr: crowdstrike
      edr_mode: prevention
    win_detection:
      ip: "10.5.9.31"
      os: windows
      domain_joined: true
      edr: crowdstrike
      edr_mode: detection
    linux_victim:
      ip: "10.5.9.40"
      os: linux
      domain_joined: false
      edr: none
      ssh_user: samba
      ssh_password: password123
    win_unmanaged:
      ip: "10.5.9.27"
      os: windows
      domain_joined: false
      edr: none

  c2:
    ip: "10.5.9.41"
    os: ubuntu
    port: 4444

  auxiliary:
    kali:
      ip: "10.5.9.21"
      os: kali

  integrations:
    firewall:
      vendor: palo_alto
      monitors_pairs:             # traffic between these pairs is logged
        - ["10.5.9.30", "10.5.9.41"]
        - ["10.5.9.31", "10.5.9.41"]
        - ["10.5.9.30", "10.5.9.21"]
        - ["10.5.9.31", "10.5.9.21"]
    email:
      vendor: mimecast
      position: mx_gateway        # all mail to domain passes through mimecast
