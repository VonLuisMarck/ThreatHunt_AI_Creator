llm:
  # Usado por el pipeline clásico (main.py sin --graph)
  #
  # ── Providers disponibles ──────────────────────────────────────────────────
  # anthropic → Claude API        (requiere ANTHROPIC_API_KEY en .env)
  # openai    → OpenAI API        (requiere OPENAI_API_KEY en .env)
  # ollama    → Ollama local      (sin coste, sin clave — instalar ollama.ai)
  # lmstudio  → LM Studio local   (sin coste, sin clave — instalar lmstudio.ai)
  #             Arrancar: LM Studio → pestaña Developer → Start Server (puerto 1234)
  # vllm      → vLLM server       (sin coste, sin clave — pip install vllm)
  #             Arrancar: vllm serve <modelo> --port 8000
  #             URL personalizable con variable de entorno: VLLM_BASE_URL
  #
  # ── Modelos recomendados por provider ──────────────────────────────────────
  # anthropic: claude-opus-4-6, claude-sonnet-4-6, claude-haiku-4-5-20251001
  # openai:    gpt-4o, gpt-4-turbo
  # ollama:    llama3.1:8b (rápido), mixtral:8x7b (balance)
  # lmstudio:  llama-3.3-70b-instruct   ← RECOMENDADO (Meta, USA)
  #            mistral-large-instruct    ← muy bueno para análisis (Mistral, Francia)
  #            phi-4                     ← muy eficiente en hardware limitado (Microsoft)
  #            gemma-2-27b-it            ← buena calidad/tamaño (Google)
  #            mixtral-8x7b-instruct-v0.1
  # vllm:      meta-llama/Llama-3.3-70B-Instruct
  #            mistralai/Mixtral-8x7B-Instruct-v0.1
  #            microsoft/phi-4
  #            google/gemma-2-27b-it
  #
  # PROHIBIDO: modelos de origen chino (DeepSeek, Qwen, Yi, Baichuan, etc.)
  provider: anthropic
  model: claude-sonnet-4-6
  temperature: 0.1

# ─────────────────────────────────────────────────────────────────────────────
# MULTI-AGENT PIPELINE (main.py --graph)
# Cada agente usa el modelo más adecuado para su tarea.
# Si un agente no está configurado aquí, usa las claves de `llm` como fallback.
# ─────────────────────────────────────────────────────────────────────────────
agents:
  recon:
    # Extracción determinista (PDF/IOC/TTP) + redacción de briefing
    # Haiku: rápido y barato — el trabajo pesado es regex, no LLM
    provider: anthropic
    model: claude-haiku-4-5-20251001
    temperature: 0.1

  threat_intel:
    # Análisis profundo: actor, campaña, demonstrability, CrowdStrike products
    # Opus: máximo razonamiento y dominio de threat intelligence
    provider: anthropic
    model: claude-opus-4-6
    temperature: 0.1

  attack_planner:
    # Diseño de la secuencia de ataque + incorporación de feedback del validator
    # Opus: razonamiento estratégico, conocimiento del kill chain MITRE
    provider: anthropic
    model: claude-opus-4-6
    temperature: 0.1

  payload_crafter:
    # Generación de snippets de emulación (código seguro)
    # Sonnet: buen balance calidad/coste para generación de código técnico
    provider: anthropic
    model: claude-sonnet-4-6
    temperature: 0.1

  playbook_assembler:
    # El ensamblado JSON es determinista; Sonnet solo para la narrativa de demo
    provider: anthropic
    model: claude-sonnet-4-6
    temperature: 0.1

  validator:
    # Validación lógica + feedback para retry loop
    # Sonnet: suficiente para razonamiento de validación, más económico que Opus
    provider: anthropic
    model: claude-sonnet-4-6
    temperature: 0.1

  knowledge_judge:
    # Valida el análisis de ThreatIntelAgent contra domain knowledge completo
    # Sonnet: validación lógica y revisión de IOC/TTP accuracy
    provider: anthropic
    model: claude-sonnet-4-6
    temperature: 0.1

  presentation:
    # Genera executive brief y key selling points de CrowdStrike
    # Sonnet: creación de material de ventas, balance calidad/coste
    provider: anthropic
    model: claude-sonnet-4-6
    temperature: 0.2

output:
  playbook_dir: playbooks

demo:
  platform: windows       # Default emulation platform: windows | linux

